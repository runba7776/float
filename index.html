<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>FloatCam Personal</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FloatCam">
<meta name="theme-color" content="#111214">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== ロック画面 ===== -->
<div id="lockScreen" class="lock-screen">
  <div class="lock-card">
    <div class="lock-lens"><span></span></div>
    <h1 id="lockTitle">FloatCam</h1>
    <p id="lockSubtitle" class="lock-sub">パスコードを入力してください</p>
    <input id="pwInput" class="pw-input" type="password" inputmode="text" autocomplete="off" placeholder="••••" maxlength="32">
    <button id="pwSubmit" class="pw-btn">解除</button>
    <p id="lockError" class="lock-error"></p>
  </div>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app" class="app hidden">

  <!-- ブラウザ部分 -->
  <div class="browser">
    <form id="urlForm" class="url-bar">
      <button type="button" id="navBack" class="nav-btn" aria-label="戻る">‹</button>
      <input id="urlInput" class="url-input" type="text" inputmode="url" placeholder="URLまたは検索ワードを入力" autocomplete="off" autocapitalize="off" autocorrect="off">
      <button type="submit" class="nav-btn go-btn" aria-label="移動">→</button>
      <button type="button" id="lockNow" class="nav-btn lock-now-btn" aria-label="ロック">🔒</button>
    </form>
    <div id="frameWrap" class="frame-wrap">
      <iframe id="webFrame" class="web-frame" src="about:blank" allow="autoplay"></iframe>
      <div id="frameHint" class="frame-hint hidden">
        このサイトは埋め込み表示を許可していない可能性があります。<br>
        <a id="openExternal" href="#" target="_blank" rel="noopener">新しいタブで開く</a>
      </div>
    </div>
  </div>

  <!-- フローティングカメラ -->
  <div id="bubble" class="bubble" style="--bw:150px; --bh:150px;">
    <video id="cam" class="cam-video" playsinline autoplay muted></video>
    <canvas id="snapCanvas" class="hidden"></canvas>
    <div id="recIndicator" class="rec-indicator hidden">
      <span class="rec-dot"></span><span id="recTime">00:00</span>
    </div>
    <div id="resizeHandle" class="resize-handle"></div>
  </div>

  <!-- カメラ操作パネル(吹き出し下に常設) -->
  <div id="controls" class="controls">
    <div class="zoom-row">
      <span class="zoom-label">0.5x</span>
      <input id="zoomSlider" class="zoom-slider" type="range" min="0" max="100" value="0">
      <span class="zoom-label" id="zoomMaxLabel">2x</span>
      <span id="zoomValue" class="zoom-value">1.0x</span>
    </div>
    <div class="btn-row">
      <button id="flipBtn" class="ctrl-btn" aria-label="カメラ切替">⟲</button>
      <button id="shotBtn" class="ctrl-btn shot-btn" aria-label="写真撮影"></button>
      <button id="recBtn" class="ctrl-btn rec-btn" aria-label="録画開始"></button>
      <button id="pipBtn" class="ctrl-btn" aria-label="ピクチャーインピクチャー">⧉</button>
      <button id="dragHandleBtn" class="ctrl-btn move-btn" aria-label="移動モード">✛</button>
    </div>
    <p id="statusMsg" class="status-msg"></p>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>

<script src="app.js"></script>
</body>
</html>
